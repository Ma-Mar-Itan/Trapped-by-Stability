The logic chain of the paper
Phase 1 — Discovery
Unsupervised clustering discovers a stable phenotype.
Phase 2 — Interpretation
The phenotype appears vascular and prognostic.
Phase 3 — Confounding analysis
The phenotype strongly overlaps with manufacturer.
Phase 4 — Re-evaluation
The biological interpretation becomes uncertain.

That is the intellectual contribution of the study.


| Result                        | Interpretation        |
| ----------------------------- | --------------------- |
| Stable clusters               | looks real            |
| Vascular enhancement features | looks biological      |
| Worse HR+/HER2+ outcome       | looks prognostic      |
| Massive manufacturer overlap  | potential confounding |
